services:
  db:
    image: postgres:16-alpine
    container_name: digidarshan-db
    environment:
      POSTGRES_DB: digidarshan
      POSTGRES_USER: digidarshan
      POSTGRES_PASSWORD: digidarshan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: digidarshan-api
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://digidarshan:digidarshan@db:5432/digidarshan
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata:
